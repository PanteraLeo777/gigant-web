<!doctype html>
<html lang="cs" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigant Orienteering - Work in Progress</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;600&display=swap');

        :root {
            --accent-red: #e30613;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        /* Animace pro cyklistu */
        @keyframes rideAcross {
            from {
                transform: translateX(-100vw);
            }

            to {
                transform: translateX(calc(100vw + 200px));
            }
        }

        .cyclist-easter-egg {
            position: absolute;
            bottom: -20px;
            /* Umístění pod textem */
            left: 0;
            width: 150px;
            /* Uprav podle velikosti tvého GIFu */
            display: none;
            /* Schovaný, dokud neuběhne 5s */
        }

        .animate-ride {
            display: block;
            animation: rideAcross 6s linear forwards;
        }
    </style>
</head>

<body class="bg-slate-100 text-slate-900 min-h-screen flex flex-col overflow-x-hidden">

    <nav class="bg-white border-b border-slate-200 py-4 md:py-6">
        <div class="max-w-7xl mx-auto px-6">
            <a href="index.html" class="inline-block">
                <img src="logoskloboukem.png" alt="Logo" class="h-10 md:h-16 w-auto object-contain">
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 py-12 relative">
        <div class="text-center relative w-full max-w-2xl">
            <div class="inline-block p-4 rounded-full bg-red-50 mb-6">
                <i data-lucide="construction" class="w-10 h-10 md:w-12 md:h-12 text-red-600"></i>
            </div>

            <h1 class="text-3xl md:text-6xl font-bold mb-4 tracking-tight leading-tight">
                Zatím tu <span class="text-red-600">nic není...</span>
            </h1>

            <p class="text-slate-500 text-base md:text-xl font-light italic mb-20 md:mb-32">
                This page is a work in progress.
            </p>

            <div class="relative z-10">
                <a href="index.html"
                    class="inline-flex items-center gap-2 bg-slate-900 text-white px-6 py-3 md:px-8 md:py-4 rounded-lg font-bold hover:bg-red-600 transition-colors shadow-lg">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    ZPĚT NA HLAVNÍ STRÁNKU
                </a>
            </div>

            <img src="cyklista.gif" id="easterEgg" class="cyclist-easter-egg" alt="Easter Egg">
        </div>
    </main>

    <footer id="contacts" class="bg-slate-900 text-white py-10 md:py-16">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 items-center text-center md:text-left">
                <div>
                    <img src="logoskloboukem.png" class="h-12 mx-auto md:mx-0 mb-6 invert opacity-80">
                    <p class="opacity-50 text-xs md:text-sm tracking-widest uppercase">© 2026 GIGANT ORIENTEERING</p>
                </div>
                <div class="space-y-4 text-left flex flex-col items-center md:items-start">
                    <h4
                        class="font-bold text-lg md:text-xl border-b border-slate-700 pb-2 mb-2 w-full max-w-[200px] md:max-w-none">
                        KONTAKTY</h4>
                    <div class="flex flex-col gap-3 opacity-80 text-sm md:text-base">
                        <a href="mailto:info@gigantorienteering.cz"
                            class="flex items-center gap-3 hover:text-red-500 transition">
                            <i data-lucide="mail" class="w-5 h-5 text-red-600"></i> info@gigantorienteering.cz
                        </a>
                        <a href="tel:+420603830727" class="flex items-center gap-3 hover:text-red-500 transition">
                            <i data-lucide="phone" class="w-5 h-5 text-red-600"></i> +420 603 830 727
                        </a>
                        <a href="https://www.facebook.com/gigant.orienteering/" target="_blank"
                            class="flex items-center gap-3 hover:text-red-500 transition">
                            <i data-lucide="facebook" class="w-5 h-5 text-red-600"></i> Facebook
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // Spuštění po 5 sekundách (v kódu máš 7s, nechal jsem tam rezervu)
        setTimeout(() => {
            const gif = document.getElementById('easterEgg');
            if (gif) gif.classList.add('animate-ride');
        }, 5000);
    </script>
</body>

</html>
