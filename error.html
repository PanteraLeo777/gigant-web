<!doctype html>
<html lang="cs" class="h-full overflow-x-hidden">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigant Orienteering - Work in Progress</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;600&display=swap');

        :root {
            --accent-red: #e30613;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        /* Animace pro cyklistu */
        @keyframes rideAcross {
            from {
                transform: translateX(-100vw);
            }

            to {
                transform: translateX(calc(100vw + 200px));
            }
        }

        .cyclist-easter-egg {
            position: absolute;
            bottom: -20px;
            /* Umístění pod textem */
            left: 0;
            width: 150px;
            /* Uprav podle velikosti tvého GIFu */
            display: none;
            /* Schovaný, dokud neuběhne 5s */
        }

        .animate-ride {
            display: block;
            animation: rideAcross 5s linear forwards;
        }
    </style>
</head>

<body class="bg-slate-100 text-slate-900 min-h-full flex flex-col">

    <nav class="bg-white border-b border-slate-200 py-6">
        <div class="max-w-7xl mx-auto px-6">
            <a href="index.html" class="inline-block">
                <img src="logoskloboukem.png" alt="Logo" class="h-12 md:h-16 w-auto object-contain">
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 relative overflow-hidden">
        <div class="text-center relative">
            <div class="inline-block p-4 rounded-full bg-red-50 mb-6">
                <i data-lucide="construction" class="w-12 h-12 text-red-600"></i>
            </div>

            <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">
                Zatím tu nic není...
            </h1>

            <p class="text-slate-500 text-lg md:text-xl font-light italic mb-24">
                This page is a work in progress.
            </p>

            <a href="index.html"
                class="inline-flex items-center gap-2 bg-slate-900 text-white px-8 py-3 rounded-lg font-bold hover:bg-red-600 transition-colors shadow-lg z-10 relative">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                ZPĚT NA HLAVNÍ STRÁNKU
            </a>

            <img src="cyklista.gif" id="easterEgg" class="cyclist-easter-egg" alt="Easter Egg Cyclist">
        </div>
    </main>

    <footer id="contacts" class="bg-slate-900 text-white py-12 md:py-16">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center text-center md:text-left">
                <div>
                    <img src="logoskloboukem.png" class="h-12 mx-auto md:mx-0 mb-6 invert opacity-80">
                    <p class="opacity-50 text-sm tracking-widest uppercase">© 2026 GIGANT ORIENTEERING</p>
                </div>
                <div class="space-y-4 text-left inline-block mx-auto md:mx-0">
                    <h4 class="font-bold text-xl border-b border-slate-700 pb-2 mb-4 block">KONTAKTY</h4>
                    <div class="flex flex-col gap-4 opacity-80">
                        <a href="mailto:info@gigantorienteering.cz"
                            class="flex items-center gap-3 hover:text-red-500 transition">
                            <i data-lucide="mail" class="w-5 h-5 text-red-600"></i> info@gigantorienteering.cz
                        </a>
                        <a href="tel:+420603830727" class="flex items-center gap-3 hover:text-red-500 transition">
                            <i data-lucide="phone" class="w-5 h-5 text-red-600"></i> +420 603 830 727
                        </a>
                        <a href="https://www.facebook.com/gigant.orienteering/" target="_blank"
                            class="flex items-center gap-3 hover:text-red-500 transition">
                            <i data-lucide="facebook" class="w-5 h-5 text-red-600"></i> Facebook
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // Po 5 sekundách přidá třídu, která spustí animaci
        setTimeout(() => {
            const gif = document.getElementById('easterEgg');
            gif.classList.add('animate-ride');
        }, 7000);
    </script>
</body>

</html>
